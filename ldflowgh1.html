<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LD Flow</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #ddd;
    --aff: #1a6b3c;
    --neg: #9b1a1a;
    --text: #1a1a1a;
    --muted: #888;
    --light: #f9f9f7;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    min-height: 100vh;
  }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .brand {
    font-weight: 500;
    font-size: 14px;
    color: var(--text);
    white-space: nowrap;
  }

  .res-input {
    flex: 1;
    min-width: 160px;
    background: var(--light);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 5px 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text);
    outline: none;
  }
  .res-input::placeholder { color: var(--muted); }
  .res-input:focus { border-color: #aaa; }

  .timers-row {
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .timer-block {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .timer-label {
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  .timer-display {
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 0.04em;
    min-width: 56px;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .timer-display.warn { color: #b85c00; }
  .timer-display.over { color: var(--neg); }
  .timer-display.running { color: #1a5c9b; }
  .prep-display.running-aff { color: var(--aff); }
  .prep-display.running-neg { color: var(--neg); }
  .prep-display.low { color: #b85c00; }
  .prep-display.done { color: var(--neg); }

  .tbtn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 3px 9px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--light);
    color: var(--text);
    cursor: pointer;
    transition: background 0.1s;
    white-space: nowrap;
  }
  .tbtn:hover { background: #eee; }
  .tbtn.stop-aff { background: var(--aff); border-color: var(--aff); color: white; }
  .tbtn.stop-neg { background: var(--neg); border-color: var(--neg); color: white; }
  .tbtn.stop-speech { background: #1a5c9b; border-color: #1a5c9b; color: white; }

  select.speech-sel {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 3px 6px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--light);
    color: var(--text);
    outline: none;
    cursor: pointer;
  }

  .divider-v { width: 1px; height: 28px; background: var(--border); }

  .clear-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 3px 9px;
    border: 1px solid #ddd;
    border-radius: 3px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
  }
  .clear-btn:hover { border-color: var(--neg); color: var(--neg); }

  .flow-grid {
    display: grid;
    grid-template-columns: repeat(8, minmax(155px, 1fr));
    overflow-x: auto;
    min-height: calc(100vh - 108px);
  }

  .col {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  .col:last-child { border-right: none; }

  .col-head {
    padding: 6px 8px 5px;
    border-bottom: 2px solid;
    background: var(--surface);

  }
  .col.aff .col-head { border-color: var(--aff); }
  .col.neg .col-head { border-color: var(--neg); }

  .col-label {
    font-size: 13px;
    font-weight: 500;
  }
  .col.aff .col-label { color: var(--aff); }
  .col.neg .col-label { color: var(--neg); }

  .col-meta {
    font-size: 9px;
    color: var(--muted);
    margin-top: 1px;
  }

  .cards { flex: 1; padding: 5px 5px 4px; background: var(--bg); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    margin-bottom: 4px;
    position: relative;
  }
  .card.tag-v { border-left: 3px solid #c09000; }
  .card.tag-c { border-left: 3px solid #2060a0; }
  .card.tag-i { border-left: 3px solid #6b35a8; }
  .card.tag-x { border-left: 3px solid #999; }

  .tag-row { display: flex; gap: 3px; padding: 4px 4px 0; }

  .tag-pill {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 2px;
    cursor: pointer;
    border: 1px solid #e0e0e0;
    background: transparent;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    transition: all 0.1s;
  }
  .tag-pill:hover { border-color: #999; color: var(--text); }
  .tag-pill.on-v { background: #fef9e7; border-color: #c09000; color: #7a5e00; }
  .tag-pill.on-c { background: #eef3fb; border-color: #2060a0; color: #2060a0; }
  .tag-pill.on-i { background: #f5eefb; border-color: #6b35a8; color: #6b35a8; }
  .tag-pill.on-x { background: #f4f4f4; border-color: #999; color: #555; }

  .card-ta {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px;
    line-height: 1.55;
    resize: none;
    padding: 4px 20px 6px 6px;
    outline: none;
    min-height: 40px;
  }
  .card-ta::placeholder { color: #ccc; }

  .card-del {
    position: absolute;
    top: 3px; right: 3px;
    background: none; border: none;
    color: #ccc; cursor: pointer;
    font-size: 14px; line-height: 1;
    padding: 0 2px; display: none;
  }
  .card:hover .card-del { display: block; }
  .card-del:hover { color: var(--neg); }

  .add-btn {
    width: 100%;
    background: transparent;
    border: 1px dashed #ccc;
    border-radius: 3px;
    color: #bbb;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 9px 5px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .add-btn:hover { border-color: #999; color: var(--text); background: var(--surface); }
</style>
</head>
<body>

<div class="topbar">
  <span class="brand">LD flow</span>
  <input class="res-input" id="res" placeholder="Resolution…" />
  <button class="clear-btn" onclick="clearAll()">clear all</button>
</div>

<div class="timers-row">
  <div class="timer-block">
    <span class="timer-label">Speech</span>
    <select class="speech-sel" id="speech-sel" onchange="loadSpeech()">
      <option value="360">AC 6:00</option>
      <option value="180">CX 3:00</option>
      <option value="420">NC 7:00</option>
      <option value="180">CX 3:00</option>
      <option value="240">1AR 4:00</option>
      <option value="180">CX 3:00</option>
      <option value="360">NR 6:00</option>
      <option value="180">2AR 3:00</option>
    </select>
    <span class="timer-display" id="speech-disp">6:00</span>
    <button class="tbtn" id="speech-btn" onclick="toggleSpeech()">start</button>
    <button class="tbtn" onclick="resetSpeech()">↺</button>
  </div>

  <div class="divider-v"></div>

  <div class="timer-block">
    <span class="timer-label" style="color:var(--aff)">Aff prep</span>
    <span class="timer-display prep-display" id="aff-disp">4:00</span>
    <button class="tbtn" id="aff-btn" onclick="togglePrep('aff')">use</button>
    <button class="tbtn" onclick="resetPrep('aff')">↺</button>
  </div>

  <div class="divider-v"></div>

  <div class="timer-block">
    <span class="timer-label" style="color:var(--neg)">Neg prep</span>
    <span class="timer-display prep-display" id="neg-disp">4:00</span>
    <button class="tbtn" id="neg-btn" onclick="togglePrep('neg')">use</button>
    <button class="tbtn" onclick="resetPrep('neg')">↺</button>
  </div>
</div>

<div class="flow-grid" id="grid"></div>

<script>
const speeches = [
  { id: 'ac',  label: 'AC',  name: 'Aff Constructive',   side: 'aff', time: '6 min' },
  { id: 'cx1', label: 'CX',  name: 'Cross Examination',  side: 'neg', time: '3 min' },
  { id: 'nc',  label: 'NC',  name: 'Neg Constructive',   side: 'neg', time: '7 min' },
  { id: 'cx2', label: 'CX',  name: 'Cross Examination',  side: 'aff', time: '3 min' },
  { id: '1ar', label: '1AR', name: '1st Aff Rebuttal',   side: 'aff', time: '4 min' },
  { id: 'cx3', label: 'CX',  name: 'Cross Examination',  side: 'neg', time: '3 min' },
  { id: 'nr',  label: 'NR',  name: 'Neg Rebuttal',       side: 'neg', time: '6 min' },
  { id: '2ar', label: '2AR', name: '2nd Aff Rebuttal',   side: 'aff', time: '3 min' },
];

const tagDefs = [
  { key: 'v', label: 'val' },
  { key: 'c', label: 'cont' },
  { key: 'i', label: 'imp' },
  { key: 'x', label: 'drop' },
];

let flow = {};
speeches.forEach(s => flow[s.id] = []);

let speechSeconds = 360;
let speechRunning = false;
let speechTimer = null;

function loadSpeech() {
  speechSeconds = parseInt(document.getElementById('speech-sel').value);
  clearInterval(speechTimer);
  speechRunning = false;
  document.getElementById('speech-btn').textContent = 'start';
  document.getElementById('speech-btn').className = 'tbtn';
  renderSpeech();
}

function toggleSpeech() {
  if (speechRunning) {
    clearInterval(speechTimer);
    speechRunning = false;
    document.getElementById('speech-btn').textContent = 'start';
    document.getElementById('speech-btn').className = 'tbtn';
  } else {
    speechRunning = true;
    document.getElementById('speech-btn').textContent = 'stop';
    document.getElementById('speech-btn').className = 'tbtn stop-speech';
    speechTimer = setInterval(() => { speechSeconds--; renderSpeech(); }, 1000);
  }
}

function resetSpeech() {
  clearInterval(speechTimer);
  speechRunning = false;
  document.getElementById('speech-btn').textContent = 'start';
  document.getElementById('speech-btn').className = 'tbtn';
  loadSpeech();
}

function renderSpeech() {
  const el = document.getElementById('speech-disp');
  const abs = Math.abs(speechSeconds);
  const sign = speechSeconds < 0 ? '-' : '';
  el.textContent = `${sign}${Math.floor(abs / 60)}:${(abs % 60).toString().padStart(2, '0')}`;
  el.className = 'timer-display';
  if (speechRunning) {
    el.classList.add(speechSeconds < 0 ? 'over' : speechSeconds <= 30 ? 'warn' : 'running');
  }
}

const prepStart = 240;
let prepSeconds = { aff: prepStart, neg: prepStart };
let prepRunning = { aff: false, neg: false };
let prepTimer = { aff: null, neg: null };

function togglePrep(side) {
  const other = side === 'aff' ? 'neg' : 'aff';

  if (prepRunning[other]) {
    clearInterval(prepTimer[other]);
    prepRunning[other] = false;
    document.getElementById(`${other}-btn`).textContent = 'use';
    document.getElementById(`${other}-btn`).className = 'tbtn';
  }

  if (prepRunning[side]) {
    clearInterval(prepTimer[side]);
    prepRunning[side] = false;
    document.getElementById(`${side}-btn`).textContent = 'use';
    document.getElementById(`${side}-btn`).className = 'tbtn';
  } else {
    prepRunning[side] = true;
    document.getElementById(`${side}-btn`).textContent = 'stop';
    document.getElementById(`${side}-btn`).className = `tbtn stop-${side}`;
    prepTimer[side] = setInterval(() => { prepSeconds[side]--; renderPrep(side); }, 1000);
  }
}

function resetPrep(side) {
  clearInterval(prepTimer[side]);
  prepRunning[side] = false;
  prepSeconds[side] = prepStart;
  document.getElementById(`${side}-btn`).textContent = 'use';
  document.getElementById(`${side}-btn`).className = 'tbtn';
  renderPrep(side);
}

function renderPrep(side) {
  const el = document.getElementById(`${side}-disp`);
  const abs = Math.abs(prepSeconds[side]);
  const sign = prepSeconds[side] < 0 ? '-' : '';
  el.textContent = `${sign}${Math.floor(abs / 60)}:${(abs % 60).toString().padStart(2, '0')}`;
  el.className = 'timer-display prep-display';
  if (prepSeconds[side] < 0) el.classList.add('done');
  else if (prepSeconds[side] <= 30) el.classList.add('low');
  else if (prepRunning[side]) el.classList.add(`running-${side}`);
}

function addCard(speechId) {
  const card = { id: Date.now(), text: '', tag: null };
  flow[speechId].push(card);
  const cardsArea = document.querySelector(`[data-col="${speechId}"] .cards`);
  const addBtn = cardsArea.querySelector('.add-btn');
  cardsArea.insertBefore(buildCard(speechId, card), addBtn);
  cardsArea.querySelector(`[data-card="${card.id}"] .card-ta`).focus();
  save();
}

function deleteCard(speechId, cardId) {
  flow[speechId] = flow[speechId].filter(c => c.id !== cardId);
  const el = document.querySelector(`[data-col="${speechId}"] [data-card="${cardId}"]`);
  if (el) el.remove();
  save();
}

function toggleTag(speechId, cardId, tag) {
  const card = flow[speechId].find(c => c.id === cardId);
  if (!card) return;
  card.tag = card.tag === tag ? null : tag;
  const cardEl = document.querySelector(`[data-col="${speechId}"] [data-card="${cardId}"]`);
  if (cardEl) {
    cardEl.className = `card${card.tag ? ' tag-' + card.tag : ''}`;
    cardEl.querySelectorAll('.tag-pill').forEach(btn => {
      btn.className = `tag-pill${card.tag === btn.dataset.tagKey ? ' on-' + card.tag : ''}`;
    });
  }
  save();
}

function updateText(speechId, cardId, value) {
  const card = flow[speechId].find(c => c.id === cardId);
  if (card) card.text = value;
}

function buildCard(speechId, card) {
  const cardEl = document.createElement('div');
  cardEl.className = `card${card.tag ? ' tag-' + card.tag : ''}`;
  cardEl.dataset.card = card.id;

  const tagRow = document.createElement('div');
  tagRow.className = 'tag-row';
  tagDefs.forEach(t => {
    const btn = document.createElement('button');
    btn.className = `tag-pill${card.tag === t.key ? ' on-' + t.key : ''}`;
    btn.dataset.tagKey = t.key;
    btn.textContent = t.label;
    btn.onclick = () => toggleTag(speechId, card.id, t.key);
    tagRow.appendChild(btn);
  });
  cardEl.appendChild(tagRow);

  const textarea = document.createElement('textarea');
  textarea.className = 'card-ta';
  textarea.value = card.text;
  textarea.placeholder = '…';
  textarea.rows = 2;
  textarea.oninput = function() {
    updateText(speechId, card.id, this.value);
    autoResize(this);
  };
  textarea.onkeydown = e => {
    if (e.key === 'Enter' && e.shiftKey) {
      e.preventDefault();
      addCard(speechId);
    }
  };
  cardEl.appendChild(textarea);

  const delBtn = document.createElement('button');
  delBtn.className = 'card-del';
  delBtn.textContent = '×';
  delBtn.onclick = () => deleteCard(speechId, card.id);
  cardEl.appendChild(delBtn);

  setTimeout(() => autoResize(textarea), 0);
  return cardEl;
}

function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}

function renderFlow() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  speeches.forEach(speech => {
    const col = document.createElement('div');
    col.className = `col ${speech.side}`;
    col.dataset.col = speech.id;

    const head = document.createElement('div');
    head.className = 'col-head';
    head.innerHTML = `<div><span class="col-label">${speech.label}</span></div><div class="col-meta">${speech.name} · ${speech.time}</div>`;
    col.appendChild(head);

    const cardsArea = document.createElement('div');
    cardsArea.className = 'cards';

    flow[speech.id].forEach(card => {
      cardsArea.appendChild(buildCard(speech.id, card));
    });

    const addBtn = document.createElement('button');
    addBtn.className = 'add-btn';
    addBtn.textContent = flow[speech.id].length === 0 ? '+ click to start flowing' : '+ add';
    addBtn.onclick = () => addCard(speech.id);
    cardsArea.appendChild(addBtn);

    col.appendChild(cardsArea);
    grid.appendChild(col);
  });
}

function clearAll() {
  if (!confirm('Clear all cards?')) return;
  speeches.forEach(s => flow[s.id] = []);
  renderFlow();
  save();
}

function save() {
  try {
    localStorage.setItem('ldflow', JSON.stringify(flow));
    localStorage.setItem('ldflow-res', document.getElementById('res').value);
  } catch(e) {}
}

function load() {
  try {
    const saved = localStorage.getItem('ldflow');
    if (saved) flow = JSON.parse(saved);
    const res = localStorage.getItem('ldflow-res');
    if (res) document.getElementById('res').value = res;
  } catch(e) {}
  renderFlow();
}

document.getElementById('res').addEventListener('input', save);
setInterval(save, 4000);

renderFlow();
renderSpeech();
renderPrep('aff');
renderPrep('neg');
load();
</script>
</body>
</html>
